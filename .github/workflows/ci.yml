name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate grammar
        run: npm run grammar:build

      - name: Verify generated grammar is committed
        run: git diff --exit-code -- src/parser/grammar.generated.ts

      - name: Run tests
        run: npm test

      - name: Build production app
        run: npm run build
